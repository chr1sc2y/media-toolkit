name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests

  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Test isolated wheel
        run: |
          python -m venv /tmp/media-toolkit-wheel
          /tmp/media-toolkit-wheel/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/media-toolkit-wheel/bin/mt styles
          /tmp/media-toolkit-wheel/bin/mt self-check --json
